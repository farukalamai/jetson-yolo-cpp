camera:
  device: "/dev/video0"
  width: 1920
  height: 1080
  fps: 30

model:
  # Mode: "detection" or "segmentation"
  # Use a detection model (e.g. yolo26s.onnx) for detection mode.
  # Use a segmentation model (e.g. yolo26s-seg.onnx) for segmentation mode.
  mode: "detection"
  engine_path: "models/engines/yolo26s.engine"
  labels_path: "models/coco.names"
  confidence_threshold: 0.5
  iou_threshold: 0.45

tracker:
  det_thresh: 0.3
  max_age: 30
  min_hits: 3
  iou_threshold: 0.3
  track_buffer: 25
  frame_rate: 30

logging:
  level: "info"     # debug, info, warn, error
  log_file: "logs/app.log"
  flush_every_seconds: 5
